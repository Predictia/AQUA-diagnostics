datasets:
  - catalog: null
    model: FESOM
    exp: hpz3
    source: monthly-3d
    regrid: null
    reader_kwargs: null # it can be a dictionary with reader kwargs
    # startdate: 1990-01
    # enddate: 1990-12

references:
    - catalog: null
    model: EN4
    exp: v4.2.2
    source: monthly-netcdf
    regrid: r100  # EN4 is on 1x1 grid different from r100
    reader_kwargs: {chunks: {"time": 1, "depth": 42}}  # it can be a dictionary with reader kwargs
    # startdate: 1990-01
    # enddate: 1990-12

output:
  outputdir: "./"
  rebuild: true
  save_netcdf: true
  save_format: ['png', 'pdf', 'svg']
  dpi: 300

diagnostics:
  ocean_stratification:
    stratification:
      diagnostic_name: 'stratification'
      run: true
      var: ['thetao', 'so']
      regions: ['ls', 'rs']
      climatology: ['January', 'JJA']
      # dim_mean: ['lat', 'lon']

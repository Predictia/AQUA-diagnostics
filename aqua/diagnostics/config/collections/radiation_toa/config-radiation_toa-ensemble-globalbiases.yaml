# The first model in this block can be overridden
# in the command line by using:
# --model, --exp, --source, --outputdir, --catalog
datasets:
  - catalog: null
    model: 'IFS-NEMO'
    exp: 'hist-1990-ensemble'
    source: 'aqua-radiation_toa-annual_climatology'
    regrid: null
    #areas: False
    #fix: True

setup:
  loglevel: 'WARNING'

output:
  outputdir: "./"
  #rebuild: true
  save_netcdf: true
  save_format: ['png', 'pdf', 'svg']
  dpi: 300

diagnostics:
  ensemble:
    run: true
    diagnostic_name: 'EnsembleLatLon'
    variable: ['tnlwrf', 'tnswrf']
    params:
      default:
    plot_params:
      default:
        projection: 'robinson'
        projection_params: {}